name: iOS Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ios-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-26-intel
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          xcrun simctl list runtimes available

      - name: Build vendored libssh
        run: ./Scripts/build-libssh-apple.sh

      - name: Run unit tests
        run: ./Scripts/test.sh
